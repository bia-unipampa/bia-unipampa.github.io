<!DOCTYPE html>

<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estatísticas de acesso · BIA · UNIPAMPA</title>

  <!-- Página não listada: fora dos buscadores -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#06070d" />

  <link rel="icon" href="assets/img/favicon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=Manrope:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="assets/css/styles.css" />

  <!-- Umami analytics (sem cookies, compatível com a LGPD) -->
  <script defer src="https://stats-bia.iotedu.org/script.js" data-website-id="42daa7a0-8da8-4c04-96aa-3e7dc8e12986"></script>

  <style>
    /* ---- estilos específicos da página de stats ---- */
    .stats-main { max-width: 1180px; margin: 0 auto; padding: 120px 20px 80px; }
    .stats-head { text-align: center; margin-bottom: 40px; }
    .stats-badge {
      display: inline-block; font-family: 'JetBrains Mono', monospace;
      font-size: .78rem; letter-spacing: .08em; text-transform: uppercase;
      padding: 6px 14px; border-radius: 999px;
      border: 1px solid rgba(120,220,255,.25); color: #7adcff; margin-bottom: 18px;
    }
    .stats-head h1 {
      font-family: 'Bricolage Grotesque', sans-serif; font-weight: 700;
      font-size: clamp(2rem, 5vw, 3.2rem); line-height: 1.05; margin: 0 0 16px;
    }
    .stats-head p { max-width: 680px; margin: 0 auto; opacity: .8; line-height: 1.55; }
    .stats-note { font-size: .92rem; opacity: .65; margin-top: 14px; }

    .stats-frame-wrap {
      position: relative; border-radius: 20px; overflow: hidden;
      border: 1px solid rgba(120,220,255,.18);
      box-shadow: 0 24px 70px rgba(0,0,0,.45); background: rgba(10,12,20,.5);
    }
    .stats-frame-wrap iframe { display: block; width: 100%; height: 1400px; border: 0; }

    .stats-setup {
      padding: 56px 28px; text-align: center; max-width: 640px; margin: 0 auto;
    }
    .stats-setup h2 {
      font-family: 'Bricolage Grotesque', sans-serif; font-size: 1.4rem; margin: 0 0 14px;
    }
    .stats-setup p { opacity: .8; line-height: 1.6; }
    .stats-setup code {
      font-family: 'JetBrains Mono', monospace; font-size: .85em;
      background: rgba(120,220,255,.1); padding: 2px 6px; border-radius: 6px;
    }
  </style>
</head>
<body>
  <div class="grain" aria-hidden="true"></div>

  <!-- ===================== NAV ===================== -->
  <header class="nav is-scrolled" id="nav">
    <a class="brand" href="index.html" aria-label="BIA, início">
      <span class="brand__mark" aria-hidden="true">
        <svg viewBox="0 0 32 32" width="28" height="28"><circle cx="8" cy="9" r="3"/><circle cx="24" cy="7" r="2.4"/><circle cx="25" cy="22" r="3"/><circle cx="9" cy="24" r="2.6"/><circle cx="16" cy="16" r="2.2"/><path d="M8 9 16 16M24 7 16 16M25 22 16 16M9 24 16 16M8 9 24 7M25 22 9 24"/></svg>
      </span>
      <span class="brand__text">BIA</span>
    </a>

    <div class="nav__right">
      <div class="langswitch" role="group" aria-label="Idioma / Language">
        <button data-lang="pt" class="is-active">PT</button>
        <button data-lang="es">ES</button>
        <button data-lang="en">EN</button>
      </div>
      <a class="btn btn--ghost" href="index.html" data-i18n="stats.back"></a>
    </div>
  </header>

  <!-- ===================== MAIN ===================== -->
  <main class="stats-main">
    <div class="stats-head">
      <span class="stats-badge" data-i18n="stats.badge"></span>
      <h1 data-i18n="stats.title"></h1>
      <p data-i18n="stats.subtitle"></p>
      <p class="stats-note" data-i18n="stats.note" id="statsNote"></p>
    </div>

    <div class="stats-frame-wrap" id="statsFrame"></div>
  </main>

  <script src="assets/js/i18n.js"></script>
  <script>
    /* =====================================================================
       stats.html: init próprio (não usa app.js, que é acoplado ao index).
       ===================================================================== */
    (function () {
      "use strict";

      /* -------------------------------------------------------------------
         COLE AQUI a "share URL" pública do seu site no Umami.
         No Umami: Configurações > Sites > (seu site) > ative "Ativar URL de
         compartilhamento" e copie o link gerado.
         Ex.: "https://stats-bia.iotedu.org/share/AbC123xyz/bia"
         Enquanto estiver vazia, a página mostra as instruções de configuração.
         ------------------------------------------------------------------- */
      var UMAMI_SHARE_URL = "https://stats-bia.iotedu.org/share/qbUfONxYML1SsOQy";

      var I18N = window.BIA_I18N || {};
      var lang = "pt";
      try {
        var saved = localStorage.getItem("bia-lang");
        if (saved && I18N[saved]) lang = saved;
      } catch (e) {}

      function t(key) {
        var dict = I18N[lang] || I18N.pt || {};
        return dict[key] != null ? dict[key] : ((I18N.pt && I18N.pt[key]) || "");
      }

      function applyI18n() {
        document.documentElement.lang = lang;
        document.querySelectorAll("[data-i18n]").forEach(function (el) {
          el.textContent = t(el.getAttribute("data-i18n"));
        });
        document.querySelectorAll("[data-i18n-html]").forEach(function (el) {
          el.innerHTML = t(el.getAttribute("data-i18n-html"));
        });
        renderFrame();
      }

      function renderFrame() {
        var wrap = document.getElementById("statsFrame");
        var note = document.getElementById("statsNote");
        if (UMAMI_SHARE_URL) {
          note.style.display = "";
          wrap.innerHTML =
            '<iframe src="' + UMAMI_SHARE_URL + '" ' +
            'title="' + t("stats.title") + '" ' +
            'loading="lazy" allowfullscreen></iframe>';
        } else {
          note.style.display = "none";
          wrap.innerHTML =
            '<div class="stats-setup">' +
            '<h2>' + t("stats.setup.title") + '</h2>' +
            '<p>' + t("stats.setup.body") + '</p>' +
            '</div>';
        }
      }

      function setLang(next) {
        if (!I18N[next]) return;
        lang = next;
        try { localStorage.setItem("bia-lang", next); } catch (e) {}
        document.querySelectorAll(".langswitch button").forEach(function (b) {
          b.classList.toggle("is-active", b.dataset.lang === next);
        });
        applyI18n();
      }

      document.querySelectorAll(".langswitch button").forEach(function (b) {
        b.addEventListener("click", function () { setLang(b.dataset.lang); });
        b.classList.toggle("is-active", b.dataset.lang === lang);
      });

      applyI18n();
    })();
  </script>

</body>

</html>
